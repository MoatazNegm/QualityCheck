services:
  - type: web
    name: qualitycheck
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "24"
      - key: JWT_SECRET
        sync: false
        value: change-me-to-a-strong-random-secret
